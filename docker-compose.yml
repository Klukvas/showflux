services:
  postgres:
    image: postgres:16-alpine
    container_name: showflux-postgres
    restart: unless-stopped
    ports:
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_USER: ${DATABASE_USER:-showflux}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-showflux_dev}
      POSTGRES_DB: ${DATABASE_NAME:-showflux}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-showflux}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: showflux-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: showflux-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-showflux}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-showflux_dev}
      DATABASE_NAME: ${DATABASE_NAME:-showflux}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      API_PORT: 3001

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: showflux-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}

volumes:
  postgres_data:
  redis_data:
