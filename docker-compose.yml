services:
  postgres:
    image: postgres:16-alpine
    container_name: showflux-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: showflux
      POSTGRES_PASSWORD: showflux_dev
      POSTGRES_DB: showflux
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: showflux-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
